<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header .logo { font-size: 20px; }
    .header .title { font-size: 16px; font-weight: 700; color: #4f8cff; }
    .header .title span { color: #ff6b35; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }
    .status .dot.offline { background: #f44336; }
    .input-group { margin-bottom: 12px; }
    .input-group label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
    .input-group input {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .input-group input:focus { border-color: #4f8cff; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #4f8cff; color: white; }
    .btn-primary:hover { background: #6fa0ff; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { height: 1px; background: #333; margin: 16px 0; }
    .videos { margin-top: 8px; }
    .videos h3 { font-size: 13px; color: #4f8cff; margin-bottom: 8px; }
    .video-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #1a1a2e;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .video-item .icon { font-size: 18px; }
    .video-item .info { flex: 1; min-width: 0; }
    .video-item .name { 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500;
    }
    .video-item .url { color: #999; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-item .dl-btn {
      padding: 4px 10px;
      background: #4f8cff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
    }
    .tasks { margin-top: 8px; }
    .tasks h3 { font-size: 13px; color: #4f8cff; margin-bottom: 8px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #1a1a2e;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .task-item .info { flex: 1; min-width: 0; }
    .task-item .name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-item .progress-bar {
      height: 3px; background: #333; border-radius: 2px; margin-top: 4px;
    }
    .task-item .progress-fill { height: 100%; background: #4f8cff; border-radius: 2px; }
    .task-item .speed { font-size: 10px; color: #999; }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: #666;
    }
    .footer a { color: #4f8cff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦞</span>
    <div class="title">问渠<span>下载器</span></div>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">检测中...</span>
  </div>
  
  <div class="input-group">
    <label>输入下载地址</label>
    <input type="text" id="urlInput" placeholder="粘贴下载链接...">
  </div>
  <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">开始下载</button>

  <div class="divider"></div>
  
  <div class="videos" id="videosSection" style="display:none">
    <h3>🎬 嗅探到的视频</h3>
    <div id="videoList"></div>
  </div>

  <div class="tasks" id="tasksSection" style="display:none">
    <h3>📥 下载任务</h3>
    <div id="taskList"></div>
  </div>

  <div class="footer">
    <a href="https://wenquso.cn" target="_blank">wenquso.cn</a> · 客服: 180-8048-8989
  </div>

  <script src="popup.js"></script>
</body>
</html>
